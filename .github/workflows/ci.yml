name: Web Demo CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm type-check

      - name: Svelte check
        run: pnpm svelte-check

  test-e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm playwright install --with-deps

      - name: Run E2E tests
        run: pnpm test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/

  a11y-scan:
    name: Accessibility Scan (axe-core)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm playwright install --with-deps

      - name: Build production
        run: pnpm build

      - name: Start preview server
        run: pnpm preview &
        env:
          PORT: 4173

      - name: Wait for server
        run: |
          timeout 30 bash -c 'until curl http://localhost:4173; do sleep 1; done'

      - name: Run axe-core accessibility tests
        run: pnpm test:a11y

      - name: Upload a11y report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: a11y-report
          path: a11y-report/

  tdd-audit:
    name: TDD Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch base branch
        run: git fetch origin main:main || true

      - name: Run TDD audit
        run: bash scripts/tdd-audit.sh origin/main

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run npm audit
        run: pnpm audit --audit-level=high

      - name: OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: 'sigilauth-web'
          path: '.'
          format: 'HTML'
          args: >
            --failOnCVSS 7
            --enableRetired

      - name: Upload OWASP report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: owasp-report-web
          path: reports/

  csp-check:
    name: CSP Headers Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check CSP configuration
        run: |
          # Verify CSP headers are configured (Knox §7.5)
          # Expected: default-src 'self'; script-src 'self' 'nonce-{random}'
          if grep -r "Content-Security-Policy" src/; then
            echo "CSP headers found"
          else
            echo "WARNING: CSP headers not configured"
            exit 1
          fi

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Verify build outputs
        run: |
          test -d build || echo "Missing build directory"
          test -f build/index.html || echo "Missing index.html"

  all-checks:
    name: All Checks Passed
    needs: [lint, test-e2e, a11y-scan, tdd-audit, security, csp-check, build]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check all jobs succeeded
        run: |
          if [[ "${{ needs.lint.result }}" != "success" ]] || \
             [[ "${{ needs.test-e2e.result }}" != "success" ]] || \
             [[ "${{ needs.a11y-scan.result }}" != "success" ]] || \
             [[ "${{ needs.tdd-audit.result }}" != "success" ]] || \
             [[ "${{ needs.security.result }}" != "success" ]] || \
             [[ "${{ needs.csp-check.result }}" != "success" ]] || \
             [[ "${{ needs.build.result }}" != "success" ]]; then
            echo "One or more checks failed"
            exit 1
          fi
          echo "All web demo checks passed!"
