apiVersion: apps/v1
kind: Deployment
metadata:
  name: sigil-web
  namespace: sigil
  labels:
    app: sigil-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sigil-web
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app: sigil-web
    spec:
      containers:
        - name: sigil-web
          image: supakaity/sigil-web:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3102
              hostPort: 3102
          envFrom:
            - secretRef:
                name: sigil-web-env
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /
              port: 3102
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: 3102
            initialDelaySeconds: 10
            periodSeconds: 10
      restartPolicy: Always
